<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamEC</title>
</head>
<body>
    <h1>Calculadora</h1>
    <div id = "calculadora">
        <input type="number" id="price" placeholder="price">
        <button id="button">Calculadora</button>

        <div id="toggles-container">
            <ul>
                <li id="isdTax-toggle">
                    <label for="isdTax">Incluir ISD (5%)</label>
                    <input type="checkbox" id="isdTax">
                    <p class="toggle-description">Salida de divisas · opcional</p>
                </li>
                <li id="bankFee-toggle">
                    <label for="bankFee">Cargo bancario (~2%)</label>
                    <input type="checkbox" id="bankFee">
                    <p class="toggle-description">comisión transacción internacional</p>
                </li>
            </ul>
        </div>

        <div id="veredict">
            <div class="results" id="results-container">
                <div class="result-row">
                    <span class="result-label">Sin oferta (con impuestos)</span>
                    <span class="result-value" id="price-noDisc"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Precio base</span>
                    <span class="result-value" id="base-price"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">IVA (15%)</span>
                    <span class="result-value" id="valIVA"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">ISD (5%)</span>
                    <span class="result-value" id="valISD"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Banco (~2%)</span>
                    <span class="result-value" id="valBankFee"></span>
                </div>
                <hr>
                <div class="result-row">
                    <span class="result-label" id="total">Total</span>
                    <span class="result-value" id="TotalVal"></span>
                </div>
             
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
